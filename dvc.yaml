vars:
  - params_snn_quant.yaml

stages:
  snn_fixed_search:
    cmd: python run_snn_quant_pipeline.py --params params_snn_quant.yaml --profile full --stage fixed --skip-prereqs
    params:
      - profiles.full.fixed_search
    outs:
      - experiments/snn_fixed_trials.jsonl
      - experiments/quant_pipeline/stage_runs.jsonl
      - experiments/quant_pipeline/pipeline_runs.jsonl

  snn_ternary_search:
    cmd: python run_snn_quant_pipeline.py --params params_snn_quant.yaml --profile full --stage ternary --skip-prereqs
    deps:
      - experiments/snn_fixed_trials.jsonl
    params:
      - profiles.full.ternary_search
    outs:
      - experiments/snn_ternary_trials.jsonl
      - experiments/quant_pipeline/stage_runs.jsonl
      - experiments/quant_pipeline/pipeline_runs.jsonl

  snn_ternary_verilator:
    cmd: python run_snn_quant_pipeline.py --params params_snn_quant.yaml --profile full --stage verilator --skip-prereqs
    deps:
      - experiments/snn_ternary_trials.jsonl
    params:
      - profiles.full.verilator_stage
    outs:
      - experiments/snn_ternary_verilator_trials.jsonl
      - experiments/verilator/
      - experiments/quant_pipeline/stage_runs.jsonl
      - experiments/quant_pipeline/pipeline_runs.jsonl

  snn_quant_full_dag:
    cmd: python run_snn_quant_pipeline.py --params params_snn_quant.yaml --profile full --stage full
    params:
      - profiles.full.fixed_search
      - profiles.full.ternary_search
      - profiles.full.verilator_stage
    outs:
      - experiments/snn_fixed_trials.jsonl
      - experiments/snn_ternary_trials.jsonl
      - experiments/snn_ternary_verilator_trials.jsonl
      - experiments/verilator/
      - experiments/quant_pipeline/stage_runs.jsonl
      - experiments/quant_pipeline/pipeline_runs.jsonl

  hw_icarus:
    cmd: python run_snn_quant_pipeline.py --params params_snn_quant.yaml --profile full --stage icarus --skip-prereqs
    params:
      - profiles.full.rtl_stage
      - profiles.full.icarus_stage
    outs:
      - experiments/hw_flow/generated_top.sv
      - experiments/hw_flow/tb_top.sv
      - experiments/hw_flow/icarus_sim.out
      - experiments/hw_flow/stage_runs.jsonl

  hw_full_dag:
    cmd: python run_snn_quant_pipeline.py --params params_snn_quant.yaml --profile full --stage full
    params:
      - profiles.full.data_generation_stage
      - profiles.full.spyx_float_stage
      - profiles.full.fixed_point_reference_stage
      - profiles.full.ternary_search
      - profiles.full.snn_ir_stage
      - profiles.full.rtl_stage
      - profiles.full.icarus_stage
      - profiles.full.verilator_integration_stage
      - profiles.full.fpga_synthesis_stage
    outs:
      - experiments/hw_flow/model_ir.json
      - experiments/hw_flow/generated_top.sv
      - experiments/hw_flow/tb_top.sv
      - experiments/hw_flow/icarus_sim.out
      - experiments/hw_flow/stage_runs.jsonl
