[project]
name = "autoresearch-mlx"
version = "0.1.0"
description = "Apple Silicon MLX port of Karpathy's autoresearch"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "mlx>=0.30.0",
    "numpy>=2.2.6",
    "optuna>=4.2.0",
    "dagster>=1.8.0",
    "dvc>=3.0",
    "pyarrow>=21.0.0",
    "pyyaml>=6.0",
    "regex>=2025.7.34",
    "requests>=2.32.0",
    "rustbpe>=0.1.0",
    "tiktoken>=0.11.0",
    "h5py>=3.0.0",
]

[project.scripts]
run-snn-quant-pipeline = "run_snn_quant_pipeline:main"

[project.optional-dependencies]
snn-ir = [
    "snn-ir @ git+https://github.com/vlordier/snn-ir.git",
]

[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",       # pydocstyle — no docstring enforcement
    "ANN",     # flake8-annotations — let ty handle types
    "ERA",     # eradicate — don't flag commented-out code
    "T20",     # flake8-print — allow print()
    "FIX",     # flake8-fixme — allow TODO/FIXME
    "TD",      # flake8-todos — no todo format rules
    "S101",    # assert — allow assert in non-test code
    "INP001",  # implicit-namespace-package — flat scripts OK
    "COM812",  # trailing-comma — conflicts with formatter
    "ISC001",  # single-line-implicit-string-concat — conflicts with formatter
    "N806",    # uppercase variable names — physics notation (L, dL, R, etc.)
    "N803",    # uppercase argument names — same as N806
    "PLR2004", # magic values — common in scientific/numeric code
    "C901",    # complexity — event emulator step is inherently branchy
    "PLR0912", # too many branches — same reason as C901
    "PLR0913", # too many arguments — config-heavy constructors
    "EM101",   # string literal in exception — too noisy for utility code
    "TRY003",  # long exception message — related to EM101
    "TC001",   # type-checking import block — not worth the noise
    "TC005",   # empty type-checking block — not worth the noise
    "B905",    # zip strict — numpy unpacking idiom
    "SIM115",  # context manager for open — writer needs persistent file handles
    "PTH123",  # Path.open over open — not always cleaner
    "RUF046",  # int(round(...)) — intentional explicit conversion
]

[tool.ruff.lint.isort]
known-first-party = ["spyx_mlx", "datagen"]

[tool.ty.environment]
python-version = "3.12"

[tool.ty.src]
exclude = ["spyx/", ".venv/"]
