repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-format
        files: ^(datagen/.*\.py|generate_stereo_events\.py)$
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(datagen/.*\.py|generate_stereo_events\.py)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=100000']
        description: Prevent giant files (>100MB) from being committed
