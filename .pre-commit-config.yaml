repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-format
        files: ^(datagen/.*\.py|generate_stereo_events\.py)$
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(datagen/.*\.py|generate_stereo_events\.py)$

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uvx ty@0.0.24 check datagen/
        language: system
        pass_filenames: false
        always_run: true