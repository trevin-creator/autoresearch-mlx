repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-format
        files: ^(datagen/.*\.py|generate_stereo_events\.py)$
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(datagen/.*\.py|generate_stereo_events\.py)$
      - id: ruff-format
        name: ruff-format (spyx notebooks)
        files: ^spyx/.*\.ipynb$
      - id: ruff
        name: ruff (spyx notebooks)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^spyx/.*\.ipynb$

  - repo: local
    hooks:
      - id: ty-check-notebooks
        name: ty check (spyx notebooks)
        entry: bash scripts/precommit_ty_notebooks.sh
        language: system
        files: ^spyx/.*\.ipynb$
        types_or: [jupyter]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=100000']
        description: Prevent giant files (>100MB) from being committed
