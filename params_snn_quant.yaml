profiles:
  full:
    pipeline:
      name: snn_quant_pipeline

    fixed_search:
      trials: 8
      study_name: snn-fixed-search
      storage: sqlite:///experiments/snn_optuna.db
      time_budget_s: 300
      log_jsonl: experiments/snn_fixed_trials.jsonl
      timeout_s: 5400
      stage_log_jsonl: experiments/quant_pipeline/stage_runs.jsonl
      fixed_point_bits_min: 4
      fixed_point_bits_max: 12
      fixed_point_frac_min: 1
      fixed_point_frac_max: 8
      fixed_point_rounding_options: nearest,floor

    ternary_search:
      trials: 12
      study_name: snn-ternary-search
      storage: sqlite:///experiments/snn_optuna.db
      time_budget_s: 300
      log_jsonl: experiments/snn_ternary_trials.jsonl
      timeout_s: 7200
      stage_log_jsonl: experiments/quant_pipeline/stage_runs.jsonl
      ternary_threshold_min: 0.02
      ternary_threshold_max: 0.35

    verilator_stage:
      trials: 6
      study_name: snn-ternary-verilator
      storage: sqlite:///experiments/snn_optuna.db
      time_budget_s: 240
      log_jsonl: experiments/snn_ternary_verilator_trials.jsonl
      timeout_s: 7200
      stage_log_jsonl: experiments/quant_pipeline/stage_runs.jsonl
      verilator_mode: lint
      verilator_timeout_s: 120
      verilator_top: ternary_trial_top
      verilator_max_width: 512
      verilator_sim_width: 32
      verilator_sim_steps: 16

    data_generation_stage:
      command: python eventcam/generate_curriculum.py --params eventcam/params_curriculum.yaml
      timeout_s: 14400
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

    spyx_float_stage:
      command: python train_snn.py --weight-mode float --time-budget-s 300 --log-jsonl experiments/hw_flow/spyx_float_runs.jsonl
      timeout_s: 7200
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

    fixed_point_reference_stage:
      command: python train_snn.py --weight-mode fixed --fixed-point-bits 8 --fixed-point-frac-bits 4 --time-budget-s 300 --log-jsonl experiments/hw_flow/fixed_ref_runs.jsonl
      timeout_s: 7200
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

    snn_ir_stage:
      command: python train_snn.py --weight-mode ternary --time-budget-s 180 --export-ir experiments/hw_flow/model_ir.json --log-jsonl experiments/hw_flow/ternary_ir_runs.jsonl
      timeout_s: 7200
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

    rtl_stage:
      ir_json: experiments/hw_flow/model_ir.json
      rtl_sv: experiments/hw_flow/generated_top.sv
      tb_sv: experiments/hw_flow/tb_top.sv
      tb_top: tb_top
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl

    icarus_stage:
      sim_out: experiments/hw_flow/icarus_sim.out
      timeout_s: 600
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

    verilator_integration_stage:
      mode: lint
      timeout_s: 600
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

    fpga_synthesis_stage:
      command: "python -c \"print('fpga synthesis stage placeholder: replace with yosys/nextpnr or vendor flow')\""
      timeout_s: 600
      stage_log_jsonl: experiments/hw_flow/stage_runs.jsonl
      cwd: .

  smoke:
    pipeline:
      name: snn_quant_pipeline_smoke

    fixed_search:
      trials: 1
      study_name: snn-fixed-search-smoke
      storage: sqlite:///experiments/snn_optuna_smoke.db
      time_budget_s: 20
      log_jsonl: experiments/smoke/snn_fixed_trials.jsonl
      timeout_s: 600
      stage_log_jsonl: experiments/smoke/stage_runs.jsonl
      fixed_point_bits_min: 6
      fixed_point_bits_max: 6
      fixed_point_frac_min: 3
      fixed_point_frac_max: 3
      fixed_point_rounding_options: nearest

    ternary_search:
      trials: 1
      study_name: snn-ternary-search-smoke
      storage: sqlite:///experiments/snn_optuna_smoke.db
      time_budget_s: 20
      log_jsonl: experiments/smoke/snn_ternary_trials.jsonl
      timeout_s: 600
      stage_log_jsonl: experiments/smoke/stage_runs.jsonl
      ternary_threshold_min: 0.08
      ternary_threshold_max: 0.08

    verilator_stage:
      trials: 1
      study_name: snn-ternary-verilator-smoke
      storage: sqlite:///experiments/snn_optuna_smoke.db
      time_budget_s: 20
      log_jsonl: experiments/smoke/snn_ternary_verilator_trials.jsonl
      timeout_s: 600
      stage_log_jsonl: experiments/smoke/stage_runs.jsonl
      verilator_mode: lint
      verilator_timeout_s: 60
      verilator_top: ternary_trial_top
      verilator_max_width: 128
      verilator_sim_width: 32
      verilator_sim_steps: 4

    data_generation_stage:
      command: python eventcam/generate_curriculum.py --params eventcam/params_curriculum.yaml --duration 2 --backend cpu --out-dir ./experiments/smoke/datagen
      timeout_s: 1800
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .

    spyx_float_stage:
      command: python train_snn.py --weight-mode float --time-budget-s 20 --log-jsonl experiments/smoke/spyx_float_runs.jsonl
      timeout_s: 900
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .

    fixed_point_reference_stage:
      command: python train_snn.py --weight-mode fixed --fixed-point-bits 6 --fixed-point-frac-bits 3 --time-budget-s 20 --log-jsonl experiments/smoke/fixed_ref_runs.jsonl
      timeout_s: 900
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .

    snn_ir_stage:
      command: python train_snn.py --weight-mode ternary --time-budget-s 20 --export-ir experiments/smoke/model_ir.json --log-jsonl experiments/smoke/ternary_ir_runs.jsonl
      timeout_s: 900
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .

    rtl_stage:
      ir_json: experiments/smoke/model_ir.json
      rtl_sv: experiments/smoke/generated_top.sv
      tb_sv: experiments/smoke/tb_top.sv
      tb_top: tb_top
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl

    icarus_stage:
      sim_out: experiments/smoke/icarus_sim.out
      timeout_s: 240
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .

    verilator_integration_stage:
      mode: lint
      timeout_s: 240
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .

    fpga_synthesis_stage:
      command: "python -c \"print('smoke fpga synthesis placeholder')\""
      timeout_s: 120
      stage_log_jsonl: experiments/smoke/hw_stage_runs.jsonl
      cwd: .
